<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Iris" />
<meta name="theme-color" content="#F4A7B9" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23F4A7B9'/><text y='.9em' font-size='70' x='15'>🐾</text></svg>" />
<title>Iris Daily Log</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; }
  .wrap { max-width: 500px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .header-left { display: flex; align-items: center; gap: 8px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .btn-refresh { background: none; border: 0.5px solid #ccc; border-radius: 8px; cursor: pointer; padding: 4px 10px; font-size: 12px; color: #666; }
  .error { background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 0.6rem 1rem; margin-bottom: 1rem; font-size: 13px; color: #A32D2D; }
  .nav { display: flex; align-items: center; justify-content: space-between; background: #f1efe8; border-radius: 12px; padding: 0.6rem 1rem; margin-bottom: 1.25rem; }
  .nav button { background: none; border: none; cursor: pointer; font-size: 20px; padding: 0 4px; color: #1a1a1a; }
  .nav button:disabled { color: #bbb; cursor: default; }
  .nav-label { text-align: center; }
  .nav-label .day { font-size: 15px; font-weight: 500; }
  .nav-label .count { font-size: 12px; color: #666; }
  .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .filter-btn { flex: 1; padding: 0; border-radius: 10px; cursor: pointer; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; outline: none; -webkit-tap-highlight-color: transparent; }
  .timeline { display: flex; flex-direction: column; gap: 4px; }
  .empty { text-align: center; padding: 2.5rem 0; color: #888; font-size: 14px; }
  .event-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 0.55rem 0.9rem; }
  .event-icon { font-size: 16px; border-radius: 7px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .event-label { flex: 1; font-size: 14px; font-weight: 500; }
  .event-time { font-size: 12px; color: #888; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #aaa; font-size: 15px; padding: 0 2px; line-height: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div class="header-left">
      <span style="font-size:24px">🐾</span>
      <h1>Iris</h1>
    </div>
    <button class="btn-refresh" onclick="fetchEvents()">Refresh</button>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div class="nav">
    <button id="btn-back" onclick="goBack()">‹</button>
    <div class="nav-label">
      <div class="day" id="day-label">Today</div>
      <div class="count" id="day-count">Loading…</div>
    </div>
    <button id="btn-fwd" onclick="goForward()" disabled>›</button>
  </div>

  <div class="filters" id="filters"></div>
  <div id="timeline"></div>
</div>

<script>
const SUPABASE_URL = "https://cvhntedxgzpwxlhehuck.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aG50ZWR4Z3pwd3hsaGVodWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjA5NDksImV4cCI6MjA5NTU5Njk0OX0.MLA6nZpN_WbLqslX5z9SYiq31tLeRYzWJoeVBxKp2rY";

const ACTIONS = [
  { id:"fed",    label:"Fed",    emoji:"🍖", color:"#BA7517", bg:"#FAEEDA", border:"#EF9F27" },
  { id:"peed",   label:"Peed",   emoji:"💧", color:"#185FA5", bg:"#E6F1FB", border:"#378ADD" },
  { id:"pooped", label:"Pooped", emoji:"💩", color:"#3B6D11", bg:"#EAF3DE", border:"#639922" },
];
const actionMap = Object.fromEntries(ACTIONS.map(a => [a.id, a]));

let events = [], daysAgo = 0, filter = null;

function dateKey(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" });
}
function localDateStr(ts) {
  return new Date(ts).toLocaleDateString("en-CA", { timeZone: "America/Los_Angeles" });
}
function fmtDayLabel(n) {
  if (n === 0) return "Today";
  if (n === 1) return "Yesterday";
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toLocaleDateString("en-US", { timeZone: "America/Los_Angeles", weekday:"long", month:"short", day:"numeric" });
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString("en-US", { timeZone: "America/Los_Angeles", hour:"numeric", minute:"2-digit", hour12:true });
}

async function fetchEvents() {
  const from = new Date(); from.setDate(from.getDate() - 6); from.setHours(0,0,0,0);
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/events?select=*&created_at=gte.${from.toISOString()}&order=created_at.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Accept: "application/json" } }
    );
    if (!res.ok) throw new Error(await res.text());
    events = await res.json();
    document.getElementById("error").style.display = "none";
  } catch(e) {
    document.getElementById("error").textContent = "Couldn't load events. Check your connection.";
    document.getElementById("error").style.display = "block";
  }
  render();
}

async function removeEvent(id) {
  events = events.filter(e => e.id !== id);
  render();
  await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
    method: "DELETE",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  await fetchEvents();
}

function goBack()    { if (daysAgo < 6) { daysAgo++; filter = null; render(); } }
function goForward() { if (daysAgo > 0) { daysAgo--; filter = null; render(); } }
function toggleFilter(id) { filter = filter === id ? null : id; render(); }

function render() {
  const cur = dateKey(daysAgo);
  const allToday = events.filter(e => localDateStr(e.created_at) === cur).sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
  const visible = filter ? allToday.filter(e => e.action === filter) : allToday;
  const counts = Object.fromEntries(ACTIONS.map(a => [a.id, allToday.filter(e => e.action === a.id).length]));

  document.getElementById("day-label").textContent = fmtDayLabel(daysAgo);
  document.getElementById("day-count").textContent = `${allToday.length} events`;
  document.getElementById("btn-back").disabled = daysAgo >= 6;
  document.getElementById("btn-fwd").disabled = daysAgo <= 0;

  document.getElementById("filters").innerHTML = ACTIONS.map(a => {
    const active = filter === a.id;
    return `<button class="filter-btn" onclick="toggleFilter('${a.id}')">
      ${active
        ? `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0.6rem 0;">
             <span style="font-size:22px">${a.emoji}</span>
             <span style="font-size:11px;font-weight:500;color:${a.color}">${counts[a.id]}</span>
           </div>`
        : `<div style="background:${a.bg};border:1.5px solid ${a.border};border-radius:10px;width:74px;height:74px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;">
             <span style="font-size:22px">${a.emoji}</span>
             <span style="font-size:11px;font-weight:500;color:${a.color}">${counts[a.id]}</span>
           </div>`
      }
    </button>`;
  }).join("");

  const tl = document.getElementById("timeline");
  if (!visible.length) {
    tl.innerHTML = `<div class="empty">No events${filter ? " for " + actionMap[filter].label.toLowerCase() : " this day"}</div>`;
    return;
  }
  tl.innerHTML = visible.map(e => {
    const a = actionMap[e.action]; if (!a) return "";
    return `<div class="event-row">
      <span class="event-icon" style="background:${a.bg}">${a.emoji}</span>
      <span class="event-label" style="color:${a.color}">${a.label}</span>
      <span class="event-time">${fmtTime(e.created_at)}</span>
      <button class="btn-remove" onclick="removeEvent('${e.id}')">×</button>
    </div>`;
  }).join("");
}

fetchEvents();

const ws = new WebSocket(`wss://cvhntedxgzpwxlhehuck.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`);
ws.onopen = () => {
  ws.send(JSON.stringify({ topic: "realtime:public:events", event: "phx_join", payload: {}, ref: "1" }));
};
ws.onmessage = (msg) => {
  const data = JSON.parse(msg.data);
  if (data.event === "INSERT") {
    events.push(data.payload.record);
    render();
  } else if (data.event === "DELETE") {
    events = events.filter(e => e.id !== data.payload.old_record.id);
    render();
  }
};
ws.onclose = () => setTimeout(fetchEvents, 5000);
</script>
</body>
</html>
