<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Iris Daily Tracker" />
<meta name="theme-color" content="#F4A7B9" />
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23ffffff'/><text y='.9em' font-size='70' x='15'>🐾</text></svg>" />
<title>Iris Daily Tracker</title>
<link rel="manifest" href="/iris-tracker/manifest.json" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f9f9f7; color: #1a1a1a; }
  .wrap { max-width: 500px; margin: 0 auto; padding: 1.5rem 1rem; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; gap: 8px; }
  .header h1 { font-size: 18px; font-weight: 500; }
  .error { background: #FCEBEB; border: 1px solid #F09595; border-radius: 10px; padding: 0.6rem 1rem; margin-bottom: 1rem; font-size: 13px; color: #A32D2D; }
  .nav { display: flex; align-items: center; justify-content: space-between; background: #f1efe8; border-radius: 12px; padding: 0.6rem 1rem; margin-bottom: 1.25rem; touch-action: pan-y; user-select: none; }
  .nav button { background: none; border: none; cursor: pointer; font-size: 20px; padding: 0 4px; color: #1a1a1a; }
  .nav button:disabled { color: #bbb; cursor: default; }
  .nav-label { text-align: center; }
  .nav-label .day { font-size: 15px; font-weight: 500; }
  .nav-label .count { font-size: 12px; color: #666; }
  .filters { display: flex; gap: 8px; margin-bottom: 1.25rem; }
  .filter-btn { flex: 1; padding: 0; border-radius: 10px; cursor: pointer; border: none; background: transparent; display: flex; flex-direction: column; align-items: center; justify-content: center; outline: none; -webkit-tap-highlight-color: transparent; }
  .timeline { display: flex; flex-direction: column; }
  .hour-label { font-size: 14px; font-weight: 600; color: #444; padding: 12px 0 6px; letter-spacing: 0.02em; }
  .empty { text-align: center; padding: 2.5rem 0; color: #888; font-size: 14px; }
  .event-row { display: flex; align-items: center; gap: 10px; background: #fff; border: 0.5px solid #e0e0e0; border-radius: 10px; padding: 0.55rem 0.9rem; margin-bottom: 4px; }
  .event-icon { font-size: 16px; border-radius: 7px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .event-label { flex: 1; font-size: 14px; font-weight: 500; }
  .event-time { font-size: 12px; color: #555; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #aaa; font-size: 15px; padding: 0 2px; line-height: 1; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:24px">🐾</span>
    <h1>Iris's Daily Tracker</h1>
    <button onclick="initPush()" id="notify-btn" style="background:none;border:0.5px solid #ccc;border-radius:8px;padding:4px 10px;font-size:11px;color:#666;cursor:pointer">🔔</button>
  </div>

  <div id="error" class="error" style="display:none"></div>

  <div class="nav">
    <button id="btn-back" onclick="goBack()">‹</button>
    <div class="nav-label">
      <div class="day" id="day-label">Today</div>
      <div class="count" id="day-count">Loading…</div>
    </div>
    <button id="btn-fwd" onclick="goForward()" disabled>›</button>
  </div>

  <div class="filters" id="filters"></div>
  <div id="timeline"></div>
  <div id="debug" style="font-size:10px;color:#999;padding:1rem;text-align:center"></div>
</div>

<script>
const SUPABASE_URL = "https://cvhntedxgzpwxlhehuck.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2aG50ZWR4Z3pwd3hsaGVodWNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjA5NDksImV4cCI6MjA5NTU5Njk0OX0.MLA6nZpN_WbLqslX5z9SYiq31tLeRYzWJoeVBxKp2rY";

const ACTIONS = [
  { id:"fed",    label:"Fed",    emoji:"🍖", color:"#BA7517", bg:"#FAEEDA", border:"#EF9F27" },
  { id:"peed",   label:"Peed",   emoji:"💧", color:"#185FA5", bg:"#E6F1FB", border:"#378ADD" },
  { id:"pooped", label:"Pooped", emoji:"💩", color:"#3B6D11", bg:"#EAF3DE", border:"#639922" },
];
const actionMap = Object.fromEntries(ACTIONS.map(a => [a.id, a]));

const TIME_BLOCKS = [
  { label:"Evening",   start:17, end:24 },
  { label:"Afternoon", start:12, end:17 },
  { label:"Morning",   start:6,  end:12 },
  { label:"Night",     start:0,  end:6  },
];

let events = [], daysAgo = 0, filter = null, rowMap = {};

function removeRow(key) {
  const ids = rowMap[key];
  if (ids) removeEvents(ids);
}

function dateKey(n) {
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toLocaleDateString("en-CA");
}
function localDateStr(ts) {
  return new Date(ts).toLocaleDateString("en-CA");
}
function fmtDayLabel(n) {
  if (n === 0) return "Today";
  if (n === 1) return "Yesterday";
  const d = new Date(); d.setDate(d.getDate() - n);
  return d.toLocaleDateString("en-US", { weekday:"long", month:"short", day:"numeric" });
}
function fmtTime(ts) {
  return new Date(ts).toLocaleTimeString("en-US", { hour:"numeric", minute:"2-digit", hour12:true });
}

function buildRows(evts, activeFilter) {
  const filtered = activeFilter ? evts.filter(e => e.action === activeFilter) : evts;
  const sorted = filtered.slice().sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  const used = new Set();
  const rows = [];
  for (let i = 0; i < sorted.length; i++) {
    const e = sorted[i];
    if (used.has(e.id)) continue;
    const next = sorted.slice(i+1).find(n => !used.has(n.id));
    const eG = !activeFilter && (e.action === "peed" || e.action === "pooped");
    const nG = next && (next.action === "peed" || next.action === "pooped");
    if (eG && nG && (new Date(next.created_at) - new Date(e.created_at)) <= 60000) {
      const pair = [e, next].sort((a,b) => a.action === "peed" ? -1 : 1);
      rows.push(pair);
      used.add(e.id);
      used.add(next.id);
    } else {
      rows.push([e]);
      used.add(e.id);
    }
  }
  return rows.reverse();
}

async function fetchEvents() {
  const from = new Date(); from.setDate(from.getDate() - 6); from.setHours(0,0,0,0);
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/events?select=*&created_at=gte.${from.toISOString()}&order=created_at.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}`, Accept: "application/json" } }
    );
    if (!res.ok) throw new Error(await res.text());
    events = await res.json();
    document.getElementById("error").style.display = "none";
  } catch(e) {
    document.getElementById("error").textContent = "Couldn't load events. Check your connection.";
    document.getElementById("error").style.display = "block";
  }
  render();
}

async function removeEvent(id) {
  events = events.filter(e => e.id !== id);
  render();
  await fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
    method: "DELETE",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  await fetchEvents();

const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
const hasPush = "PushManager" in window;
const hasSW = "serviceWorker" in navigator;
document.getElementById("debug").textContent = `standalone:${isStandalone} push:${hasPush} sw:${hasSW}`;
}

async function removeEvents(ids) {
  events = events.filter(e => !ids.includes(e.id));
  render();
  await Promise.all(ids.map(id => fetch(`${SUPABASE_URL}/rest/v1/events?id=eq.${id}`, {
    method: "DELETE",
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  })));
  await fetchEvents();
}

function goBack()    { if (daysAgo < 6) { daysAgo++; filter = null; render(); } }
function goForward() { if (daysAgo > 0) { daysAgo--; filter = null; render(); } }
function toggleFilter(id) { filter = filter === id ? null : id; render(); }

function render() {
  rowMap = {};
  const cur = dateKey(daysAgo);
  const allToday = events.filter(e => localDateStr(e.created_at) === cur).sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
  const counts = Object.fromEntries(ACTIONS.map(a => [a.id, allToday.filter(e => e.action === a.id).length]));
  const fedEvents = allToday.filter(e => e.action === "fed");

  document.getElementById("day-label").textContent = fmtDayLabel(daysAgo);
  document.getElementById("day-count").textContent = `${allToday.length} events`;
  document.getElementById("btn-back").disabled = daysAgo >= 6;
  document.getElementById("btn-fwd").disabled = daysAgo <= 0;

  document.getElementById("filters").innerHTML = ACTIONS.map(a => {
    const active = filter === a.id;
    return `<button class="filter-btn" onclick="toggleFilter('${a.id}')">
      <div style="background:${a.bg};border:${active ? `3px solid ${a.border}` : `1.5px solid ${a.border}`};border-radius:12px;width:90px;height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;margin:0 auto;">
        <span style="font-size:26px">${a.emoji}</span>
        <span style="font-size:12px;font-weight:${active ? 700 : 500};color:${a.color}">${counts[a.id]}</span>
      </div>
    </button>`;
  }).join("");

  const tl = document.getElementById("timeline");
  if (!allToday.length) {
    tl.innerHTML = `<div class="empty">No events this day</div>`;
    return;
  }

  let html = "", hasVisible = false, rowIdx = 0;
  TIME_BLOCKS.forEach(block => {
    const blockEvts = allToday.filter(e => {
      const h = new Date(e.created_at).getHours();
      return h >= block.start && h < block.end;
    });
    if (!blockEvts.length) return;
    const rows = buildRows(blockEvts, filter);
    if (!rows.length) return;
    hasVisible = true;
    html += `<div style="display:flex;align-items:center;gap:8px;padding:12px 0 6px">
      <span style="font-size:14px;font-weight:600;color:#444;white-space:nowrap">${block.label}</span>
      <div style="flex:1;height:0.5px;background:#e0e0e0"></div>
    </div>`;
    rows.forEach(row => {
      if (row.length === 1) {
        const e = row[0]; const a = actionMap[e.action]; if (!a) return;
        let sub = "";
        if (e.action === "fed") {
          const idx = fedEvents.findIndex(f => f.id === e.id);
          if (idx === 0) sub = " · Breakfast";
          else if (idx === 1) sub = " · Dinner";
        }
        html += `<div class="event-row">
          <span class="event-icon" style="background:${a.bg}">${a.emoji}</span>
          <span class="event-label" style="color:${a.color}">${a.label}${sub}</span>
          <span class="event-time">${fmtTime(e.created_at)}</span>
          <button class="btn-remove" onclick="removeEvent('${e.id}')">×</button>
        </div>`;
      } else {
        const key = `r${rowIdx++}`;
        rowMap[key] = row.map(e => e.id);
        html += `<div class="event-row">
          <div style="display:flex;gap:4px;flex-shrink:0">
            ${row.map(e => `<span class="event-icon" style="background:${actionMap[e.action].bg}">${actionMap[e.action].emoji}</span>`).join("")}
          </div>
          <span class="event-label" style="display:flex;align-items:center">
            ${row.map((e,i) => `${i > 0 ? '<span style="color:#333;font-size:9px;margin:0 6px">+</span>' : ''}<span style="color:${actionMap[e.action].color}">${actionMap[e.action].label}</span>`).join("")}
          </span>
          <span class="event-time">${fmtTime(row[0].created_at)}</span>
          <button class="btn-remove" onclick="removeRow('${key}')">×</button>
        </div>`;
      }
    });
  });

  tl.innerHTML = hasVisible ? html : `<div class="empty">No events${filter ? " for " + actionMap[filter]?.label.toLowerCase() : " this day"}</div>`;
}

// Swipe on nav
let touchStartX = 0;
const navEl = document.querySelector(".nav");
navEl.addEventListener("touchstart", e => { touchStartX = e.touches[0].clientX; }, { passive: true });
navEl.addEventListener("touchend", e => {
  const diff = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(diff) < 40) return;
  if (diff < 0 && daysAgo < 6) { daysAgo++; filter = null; render(); }
  else if (diff > 0 && daysAgo > 0) { daysAgo--; filter = null; render(); }
});

fetchEvents();

function connectWS() {
  const ws = new WebSocket(`wss://cvhntedxgzpwxlhehuck.supabase.co/realtime/v1/websocket?apikey=${SUPABASE_KEY}&vsn=1.0.0`);
  ws.onopen = () => {
    ws.send(JSON.stringify({ topic: "realtime:public:events", event: "phx_join", payload: {}, ref: "1" }));
  };
  ws.onmessage = (msg) => {
    const data = JSON.parse(msg.data);
    if (data.event === "INSERT") { events.push(data.payload.record); render(); }
    else if (data.event === "DELETE") { events = events.filter(e => e.id !== data.payload.old_record.id); render(); }
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
  ws.onerror = () => ws.close();
}
setInterval(fetchEvents, 5000);
connectWS();

async function initPush() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  try {
    const reg = await navigator.serviceWorker.register("/iris-tracker/sw.js");
    const permission = await Notification.requestPermission();
    if (permission !== "granted") return;
    const existing = await reg.pushManager.getSubscription();
    const sub = existing || await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array("BGPkobvdvjVn_YvVfpl4I7W5mlTHq1CCKmyu763MayupsPNhPtXEH-i0E6WUUHX72sfG5xqZ9JV7KsODtWYhpbU")
    });
    await fetch(`${SUPABASE_URL}/rest/v1/subscriptions`, {
      method: "POST",
      headers: {
        apikey: SUPABASE_KEY,
        Authorization: `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates"
      },
      body: JSON.stringify({ endpoint: sub.endpoint, subscription: JSON.stringify(sub) })
    });
    console.log("Push ready");
    document.getElementById("notify-btn").textContent = "🔔✓";
    document.getElementById("notify-btn").style.color = "#3B6D11";
  } catch(e) {
    console.warn("Push init failed (non-fatal):", e);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}

window.addEventListener("load", () => setTimeout(() => {
  // Only auto-init if already granted
  if (Notification.permission === "granted") initPush();
}, 1000));
</script>
</body>
</html>
